name: CI on Pull Request

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

defaults: &backend_defaults
  run:
    working-directory: ./src

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-22.04
    defaults: *backend_defaults

    steps:
      - name: Get code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          python -m pip install black==24.10.0 ruff==0.12.0

      - name: Run Black
        run: |
          black --check .

      - name: Run Ruff
        run: |
          ruff check .

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-22.04
    defaults: *backend_defaults

    steps:
      - name: Get code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install safety
        run: |
          python -m pip install --upgrade pip
          python -m pip install safety

      - name: Run safety check
        working-directory: .
        run: |
          safety check --file requirements.txt --json || safety check --file requirements.txt
        continue-on-error: true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report
          working-directory: .
          path: |
            requirements.txt
          retention-days: 30

  test:
    name: Run tests
    runs-on: ubuntu-22.04
    needs: [ lint, security-scan ]

    env:
      SECRET_KEY: "dummy_secret_for_ci"
      CELERY_BROKER_URL: "memory://"
      CELERY_RESULT_BACKEND: "cache+memory://"


    strategy:
      matrix:
        python-version: [ "3.10", "3.11" ]
    defaults: *backend_defaults

    steps:
      - name: Get code
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Pytest & Coverage
        run: pytest --cov --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage.xml
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: src/coverage.xml


  build:
    name: Build container
    runs-on: ubuntu-22.04
    needs: [ test ]
    env:
      DOCKERFILE_PATH: ./docker/python/Dockerfile

    steps:
      - name: Get code
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max